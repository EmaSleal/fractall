spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: fractall
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:facturacion}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    # Fase 4: Open-Session-In-View abriría un EntityManager en el HandlerInterceptor de
    # Spring MVC, ANTES de que el método del controlador se ejecute -- es decir, antes de
    # que /auth/** (público, sin JWT) tenga oportunidad de fijar TenantContext vía
    # TenantContextDescartable. Contra un resolutor de tenant fail-closed, eso revienta
    # cualquier endpoint público que toque JPA. Además de resolver esto, es la práctica ya
    # recomendada para una API REST pura (sin vistas que perezosamente carguen asociaciones).
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  data:
    jpa:
      repositories:
        # Fase 4: cualquier método de consulta derivada (ej. UsuarioRepository#findByEmail,
        # ColaReintentoEmailRepository#findByEstadoAndProximoIntentoLessThanEqual) hace que
        # Spring Data JPA verifique la existencia de named queries al construir el bean del
        # repositorio -- lo cual abre un EntityManager real y dispara la resolución de
        # tenant (fail-closed) DURANTE el refresh del contexto, antes de que cualquier
        # request/servicio haya podido fijar TenantContext. bootstrap-mode: lazy difiere esa
        # inicialización real hasta la PRIMERA invocación efectiva de cada repositorio, momento
        # en el que el llamador (filtro JWT o TenantContextDescartable) ya fijó el contexto.
        bootstrap-mode: lazy
  flyway:
    enabled: true

application:
  security:
    jwt:
      # Access token de vida corta (15 min, ver sección 2 del documento de arquitectura).
      # El valor por defecto es SOLO para desarrollo local y NO es seguro para producción
      # -- en producción, JWT_SECRET debe venir del gestor de secretos (Vault, Fase 4).
      secret: ${JWT_SECRET:NO-USAR-EN-PRODUCCION-este-es-un-secreto-de-desarrollo-local-cambiar-siempre}
  vault:
    # Cliente de Vault (Fase 3, sección 6 del documento de arquitectura). VAULT_ROLE_ID y
    # VAULT_SECRET_ID NO tienen fallback inseguro: deben venir siempre de la salida real de
    # scripts/vault-setup-local.sh (ejecutado una vez contra el Vault local en modo dev),
    # nunca de un valor adivinable en el código fuente.
    addr: ${VAULT_ADDR:http://localhost:8200}
    role-id: ${VAULT_ROLE_ID}
    secret-id: ${VAULT_SECRET_ID}
  hacienda:
    # Cliente de la API pública de Hacienda Costa Rica (Fase 6, sección 4.10 del documento de
    # arquitectura, Categoría A portada de docs/proyecto-referencia/erp_spring_manager). Ambos
    # valores por defecto son los endpoints públicos reales -- no requieren credenciales, así
    # que a diferencia de VAULT_ROLE_ID/RESEND_API_KEY sí es seguro tener un fallback.
    api:
      url: ${HACIENDA_API_URL:https://api.hacienda.go.cr/fe/ae}
    cabys:
      url: ${HACIENDA_CABYS_URL:https://api.hacienda.go.cr/fe/cabys}
    timeout: ${HACIENDA_API_TIMEOUT:10}
    # Cliente OAuth2 + recepción de comprobantes de Hacienda (Fase 8, Categoría A portada de
    # HaciendaApiServiceImpl del ERP de referencia). client-id/secret de sandbox son públicos
    # (documentados por Hacienda para el ambiente de pruebas, sin autenticación adicional) -- por
    # eso sí tienen fallback seguro, a diferencia de VAULT_ROLE_ID/RESEND_API_KEY. Las URLs por
    # defecto son los endpoints reales de Hacienda (sandbox y producción).
    oauth:
      client-id: ${HACIENDA_OAUTH_CLIENT_ID:api-stag}
      sandbox:
        token-url: ${HACIENDA_OAUTH_SANDBOX_TOKEN_URL:https://idp.comprobanteselectronicos.go.cr/auth/realms/rut-stag/protocol/openid-connect/token}
        api-url: ${HACIENDA_OAUTH_SANDBOX_API_URL:https://api-sandbox.comprobanteselectronicos.go.cr}
      produccion:
        token-url: ${HACIENDA_OAUTH_PRODUCCION_TOKEN_URL:https://idp.comprobanteselectronicos.go.cr/auth/realms/rut/protocol/openid-connect/token}
        api-url: ${HACIENDA_OAUTH_PRODUCCION_API_URL:https://api.comprobanteselectronicos.go.cr}
  almacenamiento:
    # Oracle Object Storage (Fase 8, sección 6.4 del documento de arquitectura) -- autenticación
    # por Instance Principal (ver OciObjectStorageServiceImpl), así que aquí solo van
    # identificadores no secretos, nunca un Access/Secret Key. bucket y region sí tienen un valor
    # por defecto razonable; namespace NO -- a diferencia de un nombre de bucket (elegido
    # libremente por quien despliega) o de DB_NAME, el namespace de Object Storage lo asigna
    # Oracle por cuenta/tenancy: no existe un valor "razonable" que adivinar, mismo principio que
    # VAULT_ROLE_ID/RESEND_API_KEY (sin fallback inseguro). En pruebas SÍ hay un placeholder (ver
    # src/test/resources/application.yaml) porque OciObjectStorageServiceImpl construye el
    # cliente real de OCI de forma perezosa (ver su javadoc) -- ningún @SpringBootTest de este
    # proyecto invoca `subir()` de verdad, así que ese valor nunca se usa contra OCI real.
    oci:
      bucket: ${OCI_OBJECT_STORAGE_BUCKET:fractall-comprobantes}
      namespace: ${OCI_OBJECT_STORAGE_NAMESPACE}
      region: ${OCI_OBJECT_STORAGE_REGION:mx-queretaro-1}
  notificaciones:
    resend:
      # Proveedor de correo transaccional ya decidido (Fase 4, sección 2 y 3.1 del
      # documento de arquitectura). RESEND_API_KEY NO tiene fallback inseguro: igual que
      # VAULT_ROLE_ID/VAULT_SECRET_ID, una API key real de un proveedor de correo no tiene
      # un valor de desarrollo seguro -- debe fallar el arranque si falta, no enviar en
      # silencio con una clave adivinable.
      api-key: ${RESEND_API_KEY}
      # onboarding@resend.dev es la dirección sandbox de Resend: funciona sin verificar
      # dominio propio, segura como valor por defecto solo para desarrollo local.
      remitente: ${RESEND_FROM_EMAIL:onboarding@resend.dev}
