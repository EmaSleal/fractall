# LOCAL DEVELOPMENT compose only (Vault in dev mode, no Caddy). The full
# production compose — Raft storage + GCP KMS auto-unseal + Caddy TLS
# reverse proxy (arch doc section 9.2-9.3) — is a separate, deferred
# artifact for actual VM deployment; do not conflate the two.

services:
  postgres:
    image: postgres:18.1
    restart: unless-stopped
    environment:
      - POSTGRES_DB=facturacion
      - POSTGRES_USER=fractall
      - POSTGRES_PASSWORD=fractall
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - red_interna
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fractall"]
      interval: 10s
      timeout: 5s
      retries: 5

  vault:
    image: hashicorp/vault:1.18
    restart: unless-stopped
    user: "0"
    cap_add:
      - IPC_LOCK
    # The image entrypoint already passes -config=/vault/config.
    command: server
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/vault/gcp-credenciales.json
    networks:
      - red_interna
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8200/v1/sys/health?standbyok=true"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - vault_data:/vault/data
      - ../files/vault-config.hcl:/vault/config/vault-config.hcl:ro
      - ../files/gcp-kms-credenciales.json:/vault/gcp-credenciales.json:ro

  app:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:8088:8080"   # nunca 0.0.0.0 — ver más abajo
    environment:
      - SPRING_PROFILES_ACTIVE=produccion
      - DB_HOST=postgres
      - DB_USERNAME
      - DB_PASSWORD
      - VAULT_ADDR=http://vault:8200
      - VAULT_ROLE_ID
      - VAULT_SECRET_ID
      - RESEND_API_KEY
      - OCI_OBJECT_STORAGE_NAMESPACE
      - JAVA_TOOL_OPTIONS=-XX:MaxRAMPercentage=70.0
    networks:
      - red_interna
    depends_on:
      postgres:
        condition: service_healthy
      vault:
        condition: service_healthy

volumes:
  postgres_data:
  vault_data:
  
networks:
  red_interna:
